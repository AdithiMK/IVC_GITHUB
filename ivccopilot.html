<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive To-Do List App</title>
    <link rel="stylesheet" href="ivccopilot.css">
</head>

<body>
<div class="container">

    <div class="header">
        <h1>📝 My Tasks</h1>
        <button class="dark-mode-toggle" id="darkModeToggle">🌙</button>
    </div>

    <!-- INPUT -->
    <div class="input-section">
        <div class="input-group">
            <input id="taskInput" type="text" placeholder="Add a new task..." autocomplete="off">
            <button id="addBtn">Add</button>
        </div>

        <div class="input-options">

            <select id="categorySelect">
                <option value="General">Category: General</option>
                <option value="Work">Category: Work</option>
                <option value="Personal">Category: Personal</option>
                <option value="Shopping">Category: Shopping</option>
                <option value="Health">Category: Health</option>
            </select>

            <div class="timer-inputs">
                <label>Timer:</label>
                <input id="hoursInput" type="number" min="0" max="23" value="0">
                <span>:</span>
                <input id="minutesInput" type="number" min="0" max="59" value="0">
            </div>

            <div class="color-picker-wrapper">
                <label>Color:</label>

                <div class="color-options">
                    <button class="color-btn" data-color="#ffc0e0" style="background:#ffc0e0"></button>
                    <button class="color-btn" data-color="#667eea" style="background:#667eea"></button>
                    <button class="color-btn" data-color="#4caf50" style="background:#4caf50"></button>
                    <button class="color-btn" data-color="#ff6b6b" style="background:#ff6b6b"></button>
                    <button class="color-btn" data-color="#ffa500" style="background:#ffa500"></button>
                    <button class="color-btn" id="customColorBtn">🎨</button>
                </div>

                <input id="colorInput" type="color" value="#667eea" style="display:none;">
            </div>

        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-filter">
        <input id="searchInput" placeholder="Search tasks...">
        <select id="filterSelect">
            <option value="all">All Tasks</option>
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
        </select>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat-item"><div id="totalCount" class="stat-number">0</div><div>Total</div></div>
        <div class="stat-item"><div id="completedCount" class="stat-number">0</div><div>Completed</div></div>
        <div class="stat-item"><div id="pendingCount" class="stat-number">0</div><div>Pending</div></div>
        <div class="stat-item"><div id="overdueCount" class="stat-number">0</div><div>Overdue</div></div>
    </div>

    <!-- PRIORITY -->
    <div class="priority-summary">
        <div class="priority-box medium">
            <div id="mediumCount" class="priority-box-count">0</div>
            <div class="priority-box-label">Priority</div>
        </div>
    </div>

    <!-- TASK LIST -->
    <div class="tasks-container">
        <ul id="taskList"></ul>

        <div id="emptyState" class="empty-state">
            <div class="empty-state-icon">✨</div>
            <p>No tasks yet. Add one to get started!</p>
        </div>
    </div>

    <button id="clearAllBtn" class="clear-all-btn" style="display:none;">
        Clear Completed Tasks
    </button>

</div>

<!-- TIMER MODAL -->
<div id="timerModal" class="timer-modal" style="display:none;">
    <div class="timer-box">
        <div id="timerTaskName" class="timer-task-name"></div>
        <div class="timer-display">
            <span id="timerHours">00</span>h :
            <span id="timerMinutes">00</span>m
        </div>
        <button id="timerStopBtn" class="timer-stop-btn">Stop Timer</button>
    </div>
</div>

<script src="ivccopilot.js"></script>
</body>
</html>
